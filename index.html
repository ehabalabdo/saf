        <h1>MED LOOP - نظام إدارة العيادات والمراكز الطبية المتكامل</h1>
        <p>حل سحابي شامل يجمع الاستقبال، الملف الطبي، المواعيد، الفواتير، الموارد البشرية، مختبر الأسنان، ربط الأجهزة، وأكثر — كل شيء في منصة واحدة. يعمل من المتصفح بدون تثبيت، متاح 24/7، ويدعم العربية والإنجليزية.</p>

        <h2>إدارة العيادة</h2>
        <ul>
          <li><strong>إدارة العيادات المتعددة (Multi-Clinic Management):</strong> إنشاء عيادات وأقسام غير محدودة، تعيين أطباء وكوادر بصلاحيات منفصلة، لوحة تحكم مركزية لمتابعة الأداء، تقارير مقارنة بين العيادات.</li>
          <li><strong>نظام الاستقبال الذكي (Smart Reception):</strong> تسجيل دخول المريض بنقرة واحدة، إدارة قائمة الانتظار، تحويل المريض للعيادة فوراً، إشعارات فورية للطبيب، بحث سريع بالاسم أو الهاتف أو الرقم الوطني.</li>
          <li><strong>نظام المواعيد المتقدم (Advanced Appointments):</strong> حجز مواعيد مع تحديد الطبيب والعيادة والوقت، عرض جدولي يومي وأسبوعي وشهري، حالات متعددة، منع التضارب التلقائي.</li>
          <li><strong>شاشة الانتظار الذكية (Smart Queue Display):</strong> شاشة عرض احترافية للمرضى المنتظرين، نداء صوتي تلقائي باسم المريض، تحديث مباشر Real-time، دعم العربية والإنجليزية.</li>
        </ul>

        <h2>الملف الطبي</h2>
        <ul>
          <li><strong>لوحة الطبيب الشاملة (Doctor Dashboard):</strong> ملف طبي شامل لكل مريض، تشخيصات وملاحظات طبية، وصفات طبية قابلة للطباعة، رفع صور وملفات (أشعة، تحاليل)، خطط علاجية متعددة الجلسات، قوالب جاهزة.</li>
          <li><strong>السجل الطبي والتاريخ السريري (Clinical History):</strong> عرض زمني لجميع الزيارات، تصفية حسب التاريخ أو النوع، ملاحظات ومرفقات لكل زيارة، طباعة ملخص السجل الكامل.</li>
          <li><strong>سجل المرضى المتقدم (Patient Registry):</strong> بيانات ديموغرافية كاملة، بحث متقدم وفلترة، تصدير إلى Excel، إحصائيات المرضى الجدد والعائدين.</li>
          <li><strong>بوابة المريض الإلكترونية (Patient Portal):</strong> تسجيل دخول بالجوال أو الرقم الوطني، عرض السجل الطبي، حجز وإلغاء المواعيد، عرض الوصفات والتعليمات.</li>
        </ul>

        <h2>المالية والمحاسبة</h2>
        <ul>
          <li><strong>الفواتير والمحاسبة (Billing & Invoicing):</strong> فواتير تفصيلية مع بنود الخدمات، دفعات جزئية، تقارير مالية، طباعة احترافية، خصومات مرنة.</li>
          <li><strong>كتالوج الخدمات والأسعار (Service Catalog):</strong> قائمة خدمات شاملة، تصنيف حسب القسم، تعديل الأسعار مع حفظ التاريخ، تصدير إلى Excel.</li>
          <li><strong>التقارير والإحصائيات (Reports & Analytics):</strong> تقارير إيرادات ومصروفات، إحصائيات المرضى، أداء الأطباء، رسوم بيانية تفاعلية، لوحة مؤشرات أداء KPI.</li>
        </ul>

        <h2>الموارد البشرية</h2>
        <ul>
          <li><strong>إدارة الموظفين (Employee Management):</strong> ملف شامل لكل موظف (بيانات شخصية ووظيفية ومالية)، تحديد القسم والدور والراتب، إدارة البدلات والخصومات، هيكل تنظيمي.</li>
          <li><strong>الحضور والبصمة (Attendance & Biometric):</strong> ربط مع أجهزة البصمة لتسجيل الحضور تلقائياً، تسجيل يدوي، حساب ساعات العمل والتأخير والإضافي، تقارير حضور مفصلة، دعم الورديات.</li>
          <li><strong>الرواتب وكشف الراتب (Payroll & Payslips):</strong> حساب الراتب آلياً بناءً على الحضور، بدلات وخصومات، كشف راتب PDF احترافي، الموظف يحمّل كشفه من حسابه.</li>
          <li><strong>تقارير الموارد البشرية (HR Reports):</strong> تقارير حضور وغياب، تكلفة رواتب شهرية، إحصائيات أداء، تصدير Excel و PDF.</li>
        </ul>

        <h2>وحدات متخصصة</h2>
        <ul>
          <li><strong>مختبر الأسنان (Dental Lab):</strong> إرسال حالات من الطبيب لفني المختبر، تتبع الحالة (جديد، قيد التنفيذ، جاهز)، ملاحظات تفصيلية، إشعارات فورية.</li>
          <li><strong>شركة الزراعات (Implant Company):</strong> كتالوج منتجات الزراعة، تتبع المخزون، طلبات الأطباء، تقارير مبيعات، إشعارات انخفاض المخزون.</li>
          <li><strong>الأكاديمية والدورات (Academy & Courses):</strong> إنشاء دورات تدريبية، تسجيل طلاب، جدولة جلسات، متابعة حضور، إصدار شهادات.</li>
          <li><strong>ربط الأجهزة الطبية (Device Integration):</strong> ربط أجهزة الفحص عبر بروتوكول HL7، استقبال النتائج في ملف المريض، دعم Serial Port و MLLP، Bridge Agent للربط السحابي.</li>
        </ul>

        <h2>المنصة والأمان</h2>
        <ul>
          <li><strong>أمان وخصوصية (Security & Privacy):</strong> تشفير SSL/TLS، صلاحيات متعددة المستويات، حماية Rate Limiting و Helmet و CORS، JWT Token، فصل بيانات العملاء.</li>
          <li><strong>دعم اللغات (Multi-Language):</strong> عربي كامل مع RTL، إنجليزي كامل، تبديل فوري، تقارير وفواتير بكلتا اللغتين.</li>
          <li><strong>الوضع الليلي (Dark Mode):</strong> وضع ليلي ونهاري، تبديل فوري، حفظ التفضيل، تصميم متجاوب لجميع الشاشات.</li>
          <li><strong>منصة SaaS (Multi-Tenant):</strong> كل عميل برابط مخصص، بيانات منفصلة، لوحة Super Admin، إنشاء عميل بدقائق.</li>
          <li><strong>تكامل واتساب (WhatsApp Integration):</strong> تأكيد وتذكير المواعيد، رابط حجز للمريض، زر واتساب مباشر.</li>
        </ul>
